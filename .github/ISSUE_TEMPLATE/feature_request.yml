name: Feature Request
description: Propose a new capability, quality gate, or product surface.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What gap are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and boundaries.
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: Define measurable acceptance criteria.
  - type: textarea
    id: risks
    attributes:
      label: Risks and tradeoffs
      description: Note complexity, migration impact, or open questions.
