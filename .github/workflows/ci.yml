name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint and format checks
        run: |
          black --check .
          isort --check-only .
          ruff check .

      - name: Type checks
        run: mypy src scripts app alerts

      - name: Run test suite with coverage
        run: |
          mkdir -p reports/metrics
          pytest --junitxml=reports/metrics/pytest-results.xml --cov-report=xml:reports/metrics/coverage.xml

      - name: Upload QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts-py${{ matrix.python-version }}
          path: reports/metrics
